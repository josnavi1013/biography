<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>
<body>
    <center>
        <h2>REGISTRATION PAGE</h2>
        <form action="./login.html">
            <label>Name:<input type="text" name="u_name" required></label><br><br>
            <label>Email:<input type="email" name="email" required></label><br><br>
            <label>Password: <input type="password" required></label><br><br>
            <label>Confirm Password: <input type="password" required></label><br><br>
            <label>Mobile number: <input type="phone"></label><br><br>
            <label>Gender:<input type="radio" name="gender" value="male">Male <input type="radio" name="gender" value="female">Female</label><br><br>
            <label>Educatinal Details:</label><br>
            <input type="text" placeholder="university name">
            <input type="date" placeholder="passout year" required><br>
            <input type="text" placeholder="enter CGPA"><br><br>
            <label>Date of Birth: <input type="date" required></label><br><br>
            <input type="submit" placeholder="submit">
        </form>
        
    </center>
</body>
</html>
